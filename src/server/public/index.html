<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Binance Pro Terminal</title>
    <!-- TradingView Lightweight Charts natively injected via CDN -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #fff;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: #38bdf8;
            font-size: 1.5rem;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card span {
            font-size: 0.8rem;
            color: #94a3b8;
            display: block;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-card .val {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .positive {
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.2);
        }

        .negative {
            color: #f87171;
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.2);
        }

        .main-layout {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .chart-container {
            flex: 2;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chart-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(30, 41, 59, 0.92));
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tool-btn {
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: rgba(15, 23, 42, 0.85);
            color: #cbd5e1;
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            transition: 0.18s ease;
        }

        .tool-btn:hover {
            border-color: rgba(56, 189, 248, 0.75);
            color: #fff;
        }

        .tool-btn.active {
            background: #38bdf8;
            border-color: #38bdf8;
            color: #082f49;
            font-weight: 700;
        }

        .tool-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.24);
            color: #cbd5e1;
            font-size: 0.82rem;
            user-select: none;
        }

        .tool-toggle input {
            accent-color: #38bdf8;
        }

        .measure-readout {
            margin-left: auto;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.24);
            color: #cbd5e1;
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .measure-readout.positive {
            color: #4ade80;
        }

        .measure-readout.negative {
            color: #f87171;
        }

        .chart-surface {
            flex: 1;
            min-height: 0;
        }

        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1rem;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .logs {
            flex: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            min-height: 0;
        }

        .log-row {
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding-bottom: 4px;
        }

        .log-time {
            color: #64748b;
            margin-right: 8px;
        }

        .log-INFO {
            color: #cbd5e1;
        }

        .log-SUCCESS {
            color: #4ade80;
        }

        .log-WARN {
            color: #facc15;
        }

        .log-ERROR {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center;">
            <h1>📊 Pro Terminal<span id="env-badge"
                    style="font-size: 0.8rem; margin-left:15px; padding: 2px 8px; border-radius: 4px; background: #22c55e; color:#000; vertical-align: middle;">DEMO</span>
            </h1>
            <span id="symbol-display"
                style="color: #fff; font-weight:300; font-size:1.2rem; margin-left:15px; margin-right:20px;">...</span>
            <select id="interval-select"
                style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 10px; border-radius: 6px; outline: none; font-family: 'Inter', sans-serif;">
                <option value="1s" selected style="color: #000;">1s</option>
                <option value="10s" style="color: #000;">10s</option>
                <option value="15s" style="color: #000;">15s</option>
                <option value="30s" style="color: #000;">30s</option>
                <option value="45s" style="color: #000;">45s</option>
                <option value="1m" style="color: #000;">1m</option>
                <option value="5m" style="color: #000;">5m</option>
                <option value="15m" style="color: #000;">15m</option>
                <option value="1h" style="color: #000;">1h</option>
            </select>
        </div>
        <div class="stats-bar">
            <div class="stat-card"><span>Current Price</span>
                <div class="val" id="val-price">...</div>
            </div>
            <div class="stat-card"><span>Today's PnL</span>
                <div class="val" id="val-pnl-today">...</div>
            </div>
            <div class="stat-card"><span>Tracker PnL</span>
                <div class="val" id="val-pnl-global">...</div>
            </div>
            <div class="stat-card"><span>Global Win Rate</span>
                <div class="val" id="val-winrate-global">...</div>
            </div>
            <div class="stat-card"><span>Session PnL</span>
                <div class="val" id="val-pnl-session">...</div>
            </div>
            <div class="stat-card"><span>Session Win Rate</span>
                <div class="val" id="val-winrate-session">...</div>
            </div>
            <div class="stat-card"><span>Strategy Status</span>
                <div class="val log-INFO" id="val-state" style="font-size: 0.95rem;">...</div>
            </div>
            <div class="stat-card"><span>💰 BTC</span>
                <div class="val" id="val-btc" style="color: #f7931a;">...</div>
            </div>
            <div class="stat-card"><span>💵 USDC</span>
                <div class="val" id="val-usdc" style="color: #2775ca;">...</div>
            </div>
            <div class="stat-card"><span>📊 OBI</span>
                <div class="val" id="val-obi">...</div>
            </div>
            <div class="stat-card"><span>↔️ Spread</span>
                <div class="val" id="val-spread">...</div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <!-- Interactive TradingView Chart injected here -->
        <div class="chart-container">
            <div class="chart-toolbar">
                <div class="toolbar-group">
                    <button class="tool-btn" id="measure-btn" type="button">Ruler</button>
                    <button class="tool-btn" id="clear-measure-btn" type="button">Clear</button>
                </div>
                <div class="toolbar-group">
                    <label class="tool-toggle"><input type="checkbox" id="indicator-ema20" checked>EMA 20</label>
                    <label class="tool-toggle"><input type="checkbox" id="indicator-ema50" checked>EMA 50</label>
                    <label class="tool-toggle"><input type="checkbox" id="indicator-sma200">SMA 200</label>
                    <label class="tool-toggle"><input type="checkbox" id="indicator-bbands">BB 20</label>
                </div>
                <div class="measure-readout" id="measure-readout">Ruler off</div>
            </div>
            <div class="chart-surface" id="tvchart"></div>
        </div>
        <div class="sidebar">
            <div class="panel" style="flex: 1;">
                <h3>System Logs</h3>
                <div class="logs" id="logs-box"></div>
            </div>
            <div class="panel" style="flex: 0.5;">
                <h3>Recent Trades</h3>
                <div class="logs" id="trades-box"></div>
            </div>
        </div>
    </div>

    <script>
        // Init Lightweight Charts
        const chartElement = document.getElementById('tvchart');
        const chart = LightweightCharts.createChart(chartElement, {
            width: chartElement.clientWidth,
            height: chartElement.clientHeight,
            layout: { background: { type: 'solid', color: '#1e293b' }, textColor: '#cbd5e1' },
            grid: { vertLines: { color: 'rgba(255, 255, 255, 0.05)' }, horzLines: { color: 'rgba(255, 255, 255, 0.05)' } },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { color: 'rgba(148, 163, 184, 0.25)', width: 1, style: 2 },
                horzLine: { color: 'rgba(148, 163, 184, 0.25)', width: 1, style: 2 },
            },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#4ade80', downColor: '#f87171', borderVisible: false, wickUpColor: '#4ade80', wickDownColor: '#f87171'
        });
        const ema20Series = chart.addLineSeries({ color: '#38bdf8', lineWidth: 2, priceLineVisible: false, lastValueVisible: true });
        const ema50Series = chart.addLineSeries({ color: '#f59e0b', lineWidth: 2, priceLineVisible: false, lastValueVisible: true });
        const sma200Series = chart.addLineSeries({ color: '#e879f9', lineWidth: 2, priceLineVisible: false, lastValueVisible: true });
        const bbUpperSeries = chart.addLineSeries({ color: 'rgba(34, 197, 94, 0.85)', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
        const bbLowerSeries = chart.addLineSeries({ color: 'rgba(239, 68, 68, 0.85)', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
        const bbBasisSeries = chart.addLineSeries({ color: 'rgba(203, 213, 225, 0.55)', lineWidth: 1, lineStyle: 3, priceLineVisible: false, lastValueVisible: false });
        const rulerSeries = chart.addLineSeries({
            color: '#f8fafc',
            lineWidth: 2,
            lineStyle: 0,
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: true,
            pointMarkersVisible: true,
        });

        let currentCandles = [];
        let lastTradeCount = 0;
        let rulerActive = false;
        let rulerStart = null;
        let rulerEnd = null;

        const measureBtn = document.getElementById('measure-btn');
        const clearMeasureBtn = document.getElementById('clear-measure-btn');
        const measureReadout = document.getElementById('measure-readout');
        const indicatorInputs = {
            ema20: document.getElementById('indicator-ema20'),
            ema50: document.getElementById('indicator-ema50'),
            sma200: document.getElementById('indicator-sma200'),
            bbands: document.getElementById('indicator-bbands'),
        };

        function snapTradeTimeToCandle(tradeTime) {
            if (!currentCandles.length) return tradeTime;

            let snappedTime = currentCandles[0].time;
            for (let i = 0; i < currentCandles.length; i++) {
                if (currentCandles[i].time <= tradeTime) snappedTime = currentCandles[i].time;
                else break;
            }
            return snappedTime;
        }

        function resetMeasureState() {
            rulerStart = null;
            rulerEnd = null;
            rulerSeries.setData([]);
            measureReadout.className = 'measure-readout';
            measureReadout.innerText = rulerActive ? 'Click two prices to measure' : 'Ruler off';
        }

        function updateMeasureButtonState() {
            measureBtn.classList.toggle('active', rulerActive);
            if (!rulerActive) {
                resetMeasureState();
            } else if (!rulerStart && !rulerEnd) {
                measureReadout.className = 'measure-readout';
                measureReadout.innerText = 'Click two prices to measure';
            }
        }

        function getClosestCandleByTime(targetTime) {
            if (!currentCandles.length || targetTime == null) return null;

            let closest = currentCandles[0];
            let minDistance = Math.abs(currentCandles[0].time - targetTime);

            for (let i = 1; i < currentCandles.length; i++) {
                const distance = Math.abs(currentCandles[i].time - targetTime);
                if (distance < minDistance) {
                    closest = currentCandles[i];
                    minDistance = distance;
                }
            }

            return closest;
        }

        function getCandleIndexByTime(time) {
            return currentCandles.findIndex(candle => candle.time === time);
        }

        function calculateEMA(candles, period) {
            if (!candles.length) return [];

            const multiplier = 2 / (period + 1);
            let ema = candles[0].close;

            return candles.map((candle, index) => {
                if (index === 0) {
                    ema = candle.close;
                } else {
                    ema = (candle.close - ema) * multiplier + ema;
                }
                return { time: candle.time, value: ema };
            });
        }

        function calculateSMA(candles, period) {
            if (!candles.length) return [];

            const result = [];
            let rollingSum = 0;

            candles.forEach((candle, index) => {
                rollingSum += candle.close;
                if (index >= period) {
                    rollingSum -= candles[index - period].close;
                }

                if (index >= period - 1) {
                    result.push({
                        time: candle.time,
                        value: rollingSum / period,
                    });
                }
            });

            return result;
        }

        function calculateBollingerBands(candles, period = 20, multiplier = 2) {
            if (!candles.length) {
                return { upper: [], middle: [], lower: [] };
            }

            const upper = [];
            const middle = [];
            const lower = [];

            for (let i = period - 1; i < candles.length; i++) {
                const slice = candles.slice(i - period + 1, i + 1);
                const closes = slice.map(candle => candle.close);
                const mean = closes.reduce((sum, value) => sum + value, 0) / closes.length;
                const variance = closes.reduce((sum, value) => sum + Math.pow(value - mean, 2), 0) / closes.length;
                const deviation = Math.sqrt(variance) * multiplier;

                upper.push({ time: candles[i].time, value: mean + deviation });
                middle.push({ time: candles[i].time, value: mean });
                lower.push({ time: candles[i].time, value: mean - deviation });
            }

            return { upper, middle, lower };
        }

        function renderIndicators() {
            if (!currentCandles.length) {
                ema20Series.setData([]);
                ema50Series.setData([]);
                sma200Series.setData([]);
                bbUpperSeries.setData([]);
                bbLowerSeries.setData([]);
                bbBasisSeries.setData([]);
                return;
            }

            ema20Series.setData(indicatorInputs.ema20.checked ? calculateEMA(currentCandles, 20) : []);
            ema50Series.setData(indicatorInputs.ema50.checked ? calculateEMA(currentCandles, 50) : []);
            sma200Series.setData(indicatorInputs.sma200.checked ? calculateSMA(currentCandles, 200) : []);

            if (indicatorInputs.bbands.checked) {
                const bands = calculateBollingerBands(currentCandles, 20, 2);
                bbUpperSeries.setData(bands.upper);
                bbLowerSeries.setData(bands.lower);
                bbBasisSeries.setData(bands.middle);
            } else {
                bbUpperSeries.setData([]);
                bbLowerSeries.setData([]);
                bbBasisSeries.setData([]);
            }
        }

        function renderMeasureOverlay() {
            if (!rulerStart || !rulerEnd) {
                if (rulerActive && rulerStart) {
                    measureReadout.className = 'measure-readout';
                    measureReadout.innerText = `Anchor $${rulerStart.price.toFixed(2)} @ ${new Date(rulerStart.time * 1000).toLocaleTimeString()}`;
                }
                return;
            }

            rulerSeries.setData([
                { time: rulerStart.time, value: rulerStart.price },
                { time: rulerEnd.time, value: rulerEnd.price },
            ]);

            const delta = rulerEnd.price - rulerStart.price;
            const pct = rulerStart.price ? (delta / rulerStart.price) * 100 : 0;
            const startIndex = getCandleIndexByTime(rulerStart.time);
            const endIndex = getCandleIndexByTime(rulerEnd.time);
            const bars = startIndex >= 0 && endIndex >= 0 ? Math.abs(endIndex - startIndex) : 0;
            const cssClass = delta >= 0 ? 'positive' : 'negative';
            const sign = delta >= 0 ? '+' : '';

            measureReadout.className = `measure-readout ${cssClass}`;
            measureReadout.innerText = `Δ ${sign}$${delta.toFixed(2)} | ${sign}${pct.toFixed(3)}% | ${bars} bars`;
        }

        function resolveClickTime(param) {
            if (typeof param.time === 'number') {
                return param.time;
            }

            if (param.point && chart.timeScale().coordinateToTime) {
                const converted = chart.timeScale().coordinateToTime(param.point.x);
                return typeof converted === 'number' ? converted : null;
            }

            return null;
        }

        function getLatestTradeBySide(trades, side) {
            for (let i = trades.length - 1; i >= 0; i--) {
                if (trades[i].side === side) return trades[i];
            }
            return null;
        }

        function toFiniteNumber(value, fallback = 0) {
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : fallback;
        }

        async function initChart() {
            try {
                const interval = document.getElementById('interval-select').value;
                const res = await fetch(`/api/chart?interval=${interval}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    currentCandles = data;
                    candleSeries.setData(data);
                    renderIndicators();
                    if (rulerStart && rulerEnd) {
                        renderMeasureOverlay();
                    } else if (rulerActive) {
                        measureReadout.className = 'measure-readout';
                        measureReadout.innerText = rulerStart ? `Anchor $${rulerStart.price.toFixed(2)} @ ${new Date(rulerStart.time * 1000).toLocaleTimeString()}` : 'Click two prices to measure';
                    }
                    lastTradeCount = -1; // Force marker redraw
                }
            } catch (e) { console.error('Chart Data Error:', e); }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                document.getElementById('symbol-display').innerText = data.symbol;

                const envBadge = document.getElementById('env-badge');
                if (data.isLive) {
                    envBadge.innerText = 'LIVE';
                    envBadge.style.background = '#ef4444'; // Red target 
                    envBadge.style.color = '#fff';
                } else {
                    envBadge.innerText = 'DEMO';
                    envBadge.style.background = '#22c55e'; // Green baseline
                    envBadge.style.color = '#000';
                }

                const priceNum = parseFloat(data.price);
                document.getElementById('val-price').innerText = priceNum ? '$' + priceNum.toLocaleString(undefined, { minimumFractionDigits: 2 }) : '...';

                const todayPnl = data.todayPnl !== undefined && data.todayPnl !== null ? toFiniteNumber(data.todayPnl, 0) : null;
                const todayPnlPct = data.todayPnlPct !== undefined && data.todayPnlPct !== null ? toFiniteNumber(data.todayPnlPct, 0) : null;
                const globalPnl = toFiniteNumber(data.pnl, 0);
                const sessionPnl = toFiniteNumber(data.sessionPnl, 0);
                const globalWinRate = toFiniteNumber(data.winRate, 0);
                const sessionWinRate = toFiniteNumber(data.sessionWinRate, 0);
                const totalTrades = toFiniteNumber(data.totalTrades, 0);
                const sessionTotalTrades = toFiniteNumber(data.sessionTotalTrades, 0);
                const balanceBTC = data.balanceBTC !== undefined ? toFiniteNumber(data.balanceBTC, 0) : null;
                const balanceQuote = data.balanceQuote !== undefined ? toFiniteNumber(data.balanceQuote, 0) : null;
                const obiValue = toFiniteNumber(data.obi, 0);
                const spreadValue = data.spread !== undefined ? toFiniteNumber(data.spread, 0) : null;

                const todayPnlBox = document.getElementById('val-pnl-today');
                if (todayPnl === null || todayPnlPct === null) {
                    todayPnlBox.innerText = 'n/a';
                    todayPnlBox.className = 'val';
                    todayPnlBox.title = data.todayReferenceLabel || 'Today PnL indisponible';
                } else {
                    const pnlSign = todayPnl >= 0 ? '+' : '';
                    const pctSign = todayPnlPct >= 0 ? '+' : '';
                    todayPnlBox.innerText = `${pnlSign}${todayPnl.toFixed(2)} $ (${pctSign}${todayPnlPct.toFixed(2)}%)`;
                    todayPnlBox.className = 'val ' + (todayPnl >= 0 ? 'positive' : 'negative');
                    todayPnlBox.title = data.todayReferenceLabel || 'Reference inconnue';
                }

                const globalPnlBox = document.getElementById('val-pnl-global');
                globalPnlBox.innerText = (globalPnl >= 0 ? '+' : '') + globalPnl.toFixed(4) + ' $';
                globalPnlBox.className = 'val ' + (globalPnl >= 0 ? 'positive' : 'negative');

                const sessionPnlBox = document.getElementById('val-pnl-session');
                sessionPnlBox.innerText = (sessionPnl >= 0 ? '+' : '') + sessionPnl.toFixed(4) + ' $';
                sessionPnlBox.className = 'val ' + (sessionPnl >= 0 ? 'positive' : 'negative');

                document.getElementById('val-winrate-global').innerText = globalWinRate.toFixed(1) + '% (' + totalTrades + ')';
                document.getElementById('val-winrate-session').innerText = sessionWinRate.toFixed(1) + '% (' + sessionTotalTrades + ')';
                document.getElementById('val-state').innerText = data.state || '...';
                document.getElementById('val-btc').innerText = balanceBTC !== null ? balanceBTC.toFixed(8) : '...';
                document.getElementById('val-usdc').innerText = balanceQuote !== null ? '$' + balanceQuote.toFixed(2) : '...';

                const obiBox = document.getElementById('val-obi');
                const obiPct = (obiValue * 100).toFixed(1) + '%';
                obiBox.innerText = obiPct;
                obiBox.className = 'val ' + (obiValue > 0.55 ? 'positive' : obiValue < 0.45 ? 'negative' : '');

                document.getElementById('val-spread').innerText = spreadValue !== null ? spreadValue.toFixed(4) + '%' : '...';

                // Render Logs Box
                const logsBox = document.getElementById('logs-box');
                logsBox.innerHTML = '';
                data.logs.forEach(log => {
                    const div = document.createElement('div'); div.className = 'log-row';
                    div.innerHTML = `<span class="log-time">[${new Date(log.timestamp).toLocaleTimeString()}]</span> <span class="log-${log.type}">${log.message}</span>`;
                    logsBox.appendChild(div);
                });
            } catch (e) { console.error('Status Error'); }
        }

        async function fetchTrades() {
            try {
                const res = await fetch('/api/trades');
                const trades = await res.json();

                // If trade count changed, redraw markers to avoid heavy repaints
                if (trades.length !== lastTradeCount && currentCandles.length > 0) {
                    lastTradeCount = trades.length;

                    // Remove old price lines
                    if (window._tradeLines) {
                        window._tradeLines.forEach(l => candleSeries.removePriceLine(l));
                    }
                    window._tradeLines = [];

                    const latestBuy = getLatestTradeBySide(trades, 'BUY');
                    const latestSell = getLatestTradeBySide(trades, 'SELL');
                    const highlightedTrades = [latestBuy, latestSell].filter(Boolean);

                    const markers = highlightedTrades.map(t => ({
                        time: snapTradeTimeToCandle(t.time),
                        position: t.side === 'BUY' ? 'belowBar' : 'aboveBar',
                        color: t.side === 'BUY' ? '#4ade80' : '#f87171',
                        shape: t.side === 'BUY' ? 'arrowUp' : 'arrowDown',
                        text: `Last ${t.side} $${parseFloat(t.price).toFixed(2)}`
                    }));

                    candleSeries.setMarkers(markers.sort((a, b) => a.time - b.time));

                    highlightedTrades.forEach(t => {
                        const priceLine = candleSeries.createPriceLine({
                            price: parseFloat(t.price),
                            color: t.side === 'BUY' ? 'rgba(74, 222, 128, 0.65)' : 'rgba(248, 113, 113, 0.65)',
                            lineWidth: 2,
                            lineStyle: 2,
                            axisLabelVisible: true,
                            title: `Last ${t.side}`,
                        });
                        window._tradeLines.push(priceLine);
                    });

                    // Render textual list in the side panel
                    const tradesBox = document.getElementById('trades-box');
                    tradesBox.innerHTML = '';
                    [...trades].reverse().forEach(t => {
                        const div = document.createElement('div'); div.className = 'log-row';
                        const color = t.side === 'BUY' ? 'positive' : 'negative';
                        div.innerHTML = `<span class="log-time">[${new Date(t.time * 1000).toLocaleTimeString()}]</span> <span class="${color}">${t.side}</span> ${t.quantity} @ $${t.price}`;
                        tradesBox.appendChild(div);
                    });
                }
            } catch (e) { console.error('Trades Error'); }
        }

        document.getElementById('interval-select').addEventListener('change', () => {
            resetMeasureState();
            initChart(); // Immediately refresh on change
        });

        measureBtn.addEventListener('click', () => {
            rulerActive = !rulerActive;
            updateMeasureButtonState();
        });

        clearMeasureBtn.addEventListener('click', () => {
            resetMeasureState();
        });

        Object.values(indicatorInputs).forEach(input => {
            input.addEventListener('change', renderIndicators);
        });

        chart.subscribeClick(param => {
            if (!rulerActive || !param.point) {
                return;
            }

            const clickTime = resolveClickTime(param);
            const candle = getClosestCandleByTime(clickTime);
            const clickedPrice = candleSeries.coordinateToPrice(param.point.y);

            if (!candle || clickedPrice == null) {
                return;
            }

            const snappedPoint = {
                time: candle.time,
                price: clickedPrice,
            };

            if (!rulerStart || (rulerStart && rulerEnd)) {
                rulerStart = snappedPoint;
                rulerEnd = null;
                rulerSeries.setData([]);
                measureReadout.className = 'measure-readout';
                measureReadout.innerText = `Anchor $${rulerStart.price.toFixed(2)} @ ${new Date(rulerStart.time * 1000).toLocaleTimeString()}`;
                return;
            }

            rulerEnd = snappedPoint;
            renderMeasureOverlay();
        });

        // Orchestration Execution
        initChart().then(() => {
            fetchStatus(); fetchTrades();
            setInterval(fetchStatus, 1000);
            setInterval(initChart, 2000); // Dynamic polling
            setInterval(fetchTrades, 2000); // Check trades frequently
        });

        // Responsive Resize Logic
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartElement.clientWidth, height: chartElement.clientHeight });
        });
    </script>
</body>

</html>
